apiVersion: v1
kind: Namespace
metadata:
  name: adguard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-data
  namespace: adguard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: adguard-home
        image: adguard/adguardhome:latest
        ports:
        - containerPort: 80
          name: web
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /opt/adguardhome/work
        - name: config
          mountPath: /opt/adguardhome/conf
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: adguard-data
      - name: config
        emptyDir: {}
---
apiVersion: v1
kind: Service
# Test comment - App of Apps is working
metadata:
  name: adguard-home
  namespace: adguard
spec:
  selector:
    app: adguard-home
  ports:
  - name: web
    port: 3000
    targetPort: 3000
    nodePort: 30080
  type: NodePort
