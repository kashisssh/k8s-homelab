apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR-USERNAME/k8s-homelab.git   # ← Update with your actual repo URL
    targetRevision: HEAD
    path: apps/alertmanager
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false     # Keep false until you're comfortable
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: alertmanager-secret
      jsonPointers:
        - /data/webhook_url
      # This prevents ArgoCD from reverting your private webhook
