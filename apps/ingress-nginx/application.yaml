apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.5
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          kind: Deployment
          service:
            type: NodePort
            nodePorts:
              http: 32080
              https: 32443
          publishService:
            enabled: false
          resources:
            requests:
              cpu: 100m
              memory: 90Mi
            limits:
              memory: 200Mi
          admissionWebhooks:
            enabled: false
          metrics:
            enabled: false
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
        defaultBackend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
